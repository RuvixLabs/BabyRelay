<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101c38" />
    <meta name="robots" content="noindex" />
    <title>Join a family in BabyRelay</title>
    <link rel="stylesheet" href="/website/styles.css" />
  </head>
  <body>
    <main class="join-shell">
      <section class="join-copy" aria-labelledby="join-title">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-moon"></span>
        </div>
        <p class="eyebrow">BabyRelay invitation</p>
        <h1 id="join-title">You’ve been invited into the care circle.</h1>
        <p class="lede" id="join-detail">
          Opening BabyRelay so you can join the family and pick up where they
          left off.
        </p>
        <a class="primary-action" id="continue-link" href="#" hidden>
          Continue to BabyRelay
        </a>
        <p class="status" id="join-status" role="status" aria-live="polite">
          Preparing your invitation…
        </p>
      </section>
      <div class="care-orbit" aria-hidden="true">
        <span class="orbit-child">B</span>
        <span class="orbit-dot orbit-one"></span>
        <span class="orbit-dot orbit-two"></span>
        <span class="orbit-dot orbit-three"></span>
      </div>
      <footer class="legal-links">
        <a href="https://appstorecopilot.com/legal/3omln7px/privacy">Privacy</a>
        <a href="https://appstorecopilot.com/legal/3omln7px/terms">Terms</a>
      </footer>
    </main>
    <script src="/website/join.js" defer></script>
  </body>
</html>
